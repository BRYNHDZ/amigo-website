<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Amigos Landscaping | DuPage County Lawn Care & Maintenance</title>
    <meta name="description" content="Year-round lawn care and landscape maintenance for Wheaton, Glen Ellyn, and Winfield. Weekly mowing, mulch, aeration, leaf care. Free quotes." />
    <meta name="author" content="Amigos Landscaping" />
    <meta name="theme-color" content="#30471F" />
    <link rel="canonical" href="https://amigolandscaping.com/" />

    <!-- Preload the hero image so it starts downloading before React mounts.
         Vite rewrites /src/assets paths to hashed URLs at build time. -->
    <link rel="preload" as="image" href="/src/assets/hero-lawn.jpg" fetchpriority="high" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" rel="stylesheet">

    <!-- Open Graph -->
    <meta property="og:title" content="Amigos Landscaping | DuPage County Lawn Care & Maintenance" />
    <meta property="og:description" content="Year-round lawn care and landscape maintenance for Wheaton, Glen Ellyn, and Winfield. Weekly mowing, mulch, aeration, leaf care. Free quotes." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://amigolandscaping.com/" />
    <meta property="og:image" content="https://amigolandscaping.com/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Amigos Landscaping | DuPage County Lawn Care & Maintenance" />
    <meta name="twitter:description" content="Year-round lawn care and landscape maintenance for Wheaton, Glen Ellyn, and Winfield. Weekly mowing, mulch, aeration, leaf care. Free quotes." />
    <meta name="twitter:image" content="https://amigolandscaping.com/og-image.jpg" />
  </head>

  <body>
    <!-- Netlify Forms (build-time detection): keep this hidden form in the static HTML -->
    <form name="plan" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="plan" />
      <input type="text" name="bot-field" />
      <input type="text" name="city" />
      <input type="text" name="status" />
      <input type="text" name="wants_mowing" />
      <input type="text" name="clipping_pref" />
      <input type="text" name="lawn_health" />
      <input type="text" name="bed_maintenance" />
      <input type="text" name="spring_cleanup" />
      <input type="text" name="mulch_service" />
      <input type="text" name="trimming_plan" />
      <input type="text" name="fall_leaf_plan" />
      <input type="text" name="snow" />
      <input type="text" name="care_profile_label" />
      <input type="text" name="care_profile_desc" />
      
      <input type="text" name="perennial_pruning" />
      <input type="text" name="salt_treatment" />
      <input type="text" name="hands_off_preference" />
      <input type="text" name="plan_version" />
      <input type="text" name="name" />
      <input type="text" name="address" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
    </form>

    <!-- Netlify Forms: Recommend a Company submission -->
    <form name="recommend-company" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="recommend-company" />
      <input type="text" name="bot-field" />
      <input type="text" name="submitter_type" />
      <input type="text" name="company_name" />
      <input type="text" name="company_category" />
      <input type="text" name="company_website" />
      <input type="tel" name="company_phone" />
      <input type="text" name="why_recommend" />
      <input type="text" name="submitter_name" />
      <input type="email" name="submitter_email" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
